<!DOCTYPE html>
<html>
<head>
    <title>Gun Adventure</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        canvas {
            width: min(100vw, calc(100vh * 320/180));
            height: auto;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="320" height="180"></canvas>
    <script type="module" src="src/main.js"></script>
</body>
</html>
